# This file is only for a demo purpose, it is not used by the controller.
# Please refer to charts/claim-controller/values.yaml for the actual values used by the controller.
  workload:
    name: claim-workload
    containerName: app
    image: ghcr.io/ia-generative/playwright:v1.58.2-jammy
    imagePullPolicy: Always
    containerPort: 3000   
    readinessProbe:
      initialDelaySeconds: 1
      periodSeconds: 1
      timeoutSeconds: 1
      failureThreshold: 30
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 1
      failureThreshold: 3

  service:
    portName: http
    port: 80
    targetPort: 3000

  resources: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ .Release.Name }}
      labels:
        app.kubernetes.io/name: {{ .Values.workload.name }}
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: {{ .Values.workload.name }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ .Values.workload.name }}
        spec:
          containers:
            - name: {{ .Values.workload.containerName }}
              env:
              - name: DEBUG
                value: pw:api,pw:protocol,pw:server
              image: {{ .Values.workload.image }}
              imagePullPolicy: {{ .Values.workload.imagePullPolicy }}
              {{- with .Values.workload.args }}
              args:
                {{- range . }}
                - {{ . | quote }}
                {{- end }}
              {{- end }}
              ports:
                - containerPort: {{ .Values.workload.containerPort }}
              resources:
                limits:
                  cpu: 500m
                  memory: 512Mi
                requests:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
              - mountPath: /tmp
                name: tmp
          volumes:
          - emptyDir: {}
            name: tmp
    ---
    apiVersion: v1
    kind: Service
    metadata:
      name: {{ .Release.Name }}
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
      annotations:
        claim.controller/lazy-provisionning: "true"
        claim.controller/return: "fqdn={{ .Release.Name }}.{{ .Release.Namespace }}.svc.cluster.local"
    spec:
      ports:
        - name: {{ .Values.service.portName | default "http" }}
          port: {{ .Values.service.port }}
          targetPort: {{ .Values.service.targetPort }}
      selector:
        app.kubernetes.io/name: {{ .Values.workload.name }}
